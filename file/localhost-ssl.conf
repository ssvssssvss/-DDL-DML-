<VirtualHost *:80>
    ServerName localhost
    Redirect permanent / https://netology.ru/
</VirtualHost>

<VirtualHost *:443>
    ServerName localhost
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/apache-selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/private/apache-selfsigned.key

    Redirect permanent / https://netology.ru/
</VirtualHost>

