- name: Install and configure Zabbix Agent
 hosts: web
 become: yes

 tasks:
   - name: Install dependencies
     apt:
       name:
         - wget
         - gnupg
       state: present
       update_cache: yes

   - name: Download Zabbix repo
     get_url:
       url: https://repo.zabbix.com/zabbix/6.4/ubuntu/pool/main/z/zabbix-release/zabbix-release_6.4-1+ubuntu22.04_all.deb
       dest: /tmp/zabbix.deb

   - name: Install repo
     apt:
       deb: /tmp/zabbix.deb

   - name: Update apt
     apt:
       update_cache: yes

   - name: Install agent
     apt:
       name: zabbix-agent
       state: present

   - name: Configure agent
     lineinfile:
       path: /etc/zabbix/zabbix_agentd.conf
       regexp: '^Server='
       line: "Server={{ zabbix_server_ip }}"

   - name: Restart agent
     service:
       name: zabbix-agent
       state: restarted
